# 워크플로 이름. Actions 탭에 이 이름으로 표시된다.
name: CI

# ── 언제 이 워크플로를 돌릴까 (트리거) ──
on:
  push:
    branches: [main] # main에 푸시될 때
  pull_request:
    branches: [main] # main을 대상으로 한 PR이 열리거나 갱신될 때

# 워크플로에 주어지는 토큰 권한. 최소 권한 원칙 → 읽기만 허용.
permissions:
  contents: read

jobs:
  # ── 계층 1: 시크릿 스캐닝 (노트 03) ──
  # AI 지원 커밋의 시크릿 유출률은 약 2배(GitGuardian). 커밋 히스토리 전체를 스캔한다.
  # push protection(저장소 설정)과 2중화: push 시점 차단 + CI 시점 이력 검사.
  secrets-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # gitleaks는 diff가 아니라 커밋 이력을 스캔하므로 전체 이력이 필요하다.
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # PR에 결과 코멘트를 달 때 사용.

  test:
    # ── 매트릭스 빌드: 아래 값마다 잡을 하나씩 병렬 생성 ──
    # python-version 3개 → test (3.11), test (3.12), test (3.13) 3개 잡이 동시에 돈다.
    # "한 버전에서만 나는 버그"를 잡는 게 목적.
    strategy:
      fail-fast: false # 한 버전이 실패해도 나머지는 끝까지 돌려 전체 그림을 본다(기본값 true면 하나 깨질 때 나머지 취소).
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    runs-on: ubuntu-latest # 매 실행마다 새로 뜨는 깨끗한 빈 우분투 러너(=중립 서버)
    # steps는 위→아래 순서대로 실행되고, 하나라도 실패하면 그 즉시 잡 전체가 빨간불.
    steps:
      # 1) 저장소 코드를 러너로 내려받는다 (빈 러너엔 코드가 없으므로 항상 첫 단계).
      - uses: actions/checkout@v7

      # 2) 러너에 Python을 설치한다. 버전은 매트릭스 값을 주입(${{ matrix.python-version }}).
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      # 3) 환경 준비: requirements-dev.txt 목록대로 개발 도구(ruff·black·pytest·pytest-cov) 설치.
      #    이 단계는 "설치"일 뿐 검사가 아니다. 실제 검사는 아래 4~6단계가 한다.
      - name: Install dev deps
        run: pip install -r requirements-dev.txt

      # ── 품질 게이트 (4~6): 하나라도 실패하면 이 잡이 빨간불 ──
      # 4) Lint — 코드 스멜·미사용 변수 등 정적 검사.
      - name: Lint (ruff)
        run: ruff check .

      # 5) Format check — 코드 서식이 black 규칙과 일치하는지 검사(고치지는 않고 확인만).
      - name: Format check (black)
        run: black --check .

      # 6) Test + Coverage gate — 테스트 실행 + 커버리지가 100% 미만이면 실패.
      - name: Test + coverage gate
        run: pytest --cov=app --cov-report=term-missing --cov-fail-under=100

  # ── Docker 아티팩트: 딱 1번 빌드해서 레지스트리에 올린다 ──
  docker-build:
    needs: test # 테스트(매트릭스 전체) 통과한 코드만 이미지로 굽는다.
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # GHCR(GitHub Container Registry)에 push하려면 필요.
    steps:
      - uses: actions/checkout@v7
      # GHCR 로그인. 별도 시크릿 없이 워크플로 기본 토큰(GITHUB_TOKEN)으로 인증한다.
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # 아티팩트를 "딱 1번" 빌드하고 커밋 SHA로 태깅해 올린다. SHA 태그 = 이 커밋의 유일한 아티팩트 주소.
      - name: Build & push image (SHA 태그)
        run: |
          IMAGE=ghcr.io/${{ github.repository }}:${{ github.sha }}
          docker build -t "$IMAGE" .
          docker push "$IMAGE"

  # ── 스모크 테스트: 위에서 만든 "바로 그 이미지"를 받아 실행한다 ──
  docker-smoke:
    needs: docker-build # build 잡이 끝나야 실행.
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # 새로 빌드하지 않는다. build 잡이 만든 그 아티팩트를 SHA로 pull해 실행 = "테스트한 것 = 배포할 것" 보장.
      - name: Pull & run the exact image
        run: |
          IMAGE=ghcr.io/${{ github.repository }}:${{ github.sha }}
          docker pull "$IMAGE"
          docker run --rm "$IMAGE"

  # ── 집계 게이트 잡 ──
  # 문제: 매트릭스로 바꾸면 체크 이름이 "test (3.11)"처럼 갈라져, 브랜치 보호가 가리키던 단일 이름 "test"가 사라진다.
  # 해결: 이름이 고정된 이 잡 하나를 브랜치 보호의 필수 체크로 삼는다. 잡이 몇 개로 늘든 보호 규칙은 안 건드려도 된다.
  ci-success:
    needs: [test, docker-build, docker-smoke, secrets-scan] # 네 갈래 전부 끝나야 실행
    if: always() # 앞 잡이 실패해도 이 잡은 반드시 돌아서 결과를 판정한다(안 그러면 skip돼 체크가 pending에 걸림).
    runs-on: ubuntu-latest
    steps:
      # 앞 잡들의 종합 결과가 모두 success가 아니면 이 게이트를 실패시킨다.
      - name: Verify all jobs passed
        run: |
          if [ "${{ needs.test.result }}" != "success" ] \
             || [ "${{ needs.docker-build.result }}" != "success" ] \
             || [ "${{ needs.docker-smoke.result }}" != "success" ] \
             || [ "${{ needs.secrets-scan.result }}" != "success" ]; then
            echo "실패한 잡 있음 → 게이트 차단"
            exit 1
          fi
          echo "모든 잡 통과"

  # ── 배포(릴리스) 잡 = Continuous Delivery의 마지막 단계 ──
  # PR에선 안 돈다. main에 실제로 병합(push)됐을 때만 실행 → "검증 끝난 코드"만 배포 후보.
  deploy:
    needs: [test, docker-build, docker-smoke] # 위 검증이 다 끝나야 배포 후보가 된다.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    # ↓ 이 한 줄이 "사람 승인 버튼"을 건다. production 환경에 required reviewer가 있으면,
    #   이 잡은 승인 전까지 멈춰 대기한다 = Continuous Delivery의 핵심(기술검증 끝 → 사람이 릴리스 결정).
    environment: production
    permissions:
      contents: read
      packages: write
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # 배포 = 새로 빌드하지 않는다. 이미 테스트·스모크까지 통과한 그 SHA 이미지에
      # :latest 이름표만 붙여 올린다(promote). = "테스트한 바로 그 아티팩트를 릴리스".
      - name: Promote tested image to :latest (릴리스)
        run: |
          SHA_IMAGE=ghcr.io/${{ github.repository }}:${{ github.sha }}
          LATEST=ghcr.io/${{ github.repository }}:latest
          docker pull "$SHA_IMAGE"
          docker tag "$SHA_IMAGE" "$LATEST"
          docker push "$LATEST"
          echo "릴리스 완료: $LATEST 는 이제 $SHA_IMAGE 와 동일한 이미지"
